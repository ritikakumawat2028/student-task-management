<div class="file-upload-container">
  <input
    #fileInput
    type="file"
    [accept]="accept"
    (change)="onFileInputChange($event)"
    style="display: none;"
  />

  <div *ngIf="!preview"
       class="upload-area"
       [class.dragging]="isDragging"
       (click)="fileInput.click()"
       (dragover)="onDragOver($event)"
       (dragleave)="onDragLeave($event)"
       (drop)="onDrop($event)">
    <div class="upload-content">
      <div class="upload-icon" [class.dragging]="isDragging">
        <mat-icon>cloud_upload</mat-icon>
      </div>
      <div class="upload-text">
        <p class="upload-title">{{ isDragging ? 'Drop file here' : label }}</p>
        <p class="upload-subtitle">Drag and drop or click to browse</p>
        <p class="upload-info">Maximum file size: {{ maxSize }}MB</p>
      </div>
    </div>
  </div>

  <div *ngIf="preview" class="preview-area">
    <div class="preview-content">
      <div class="preview-thumbnail" *ngIf="isImage">
        <img [src]="preview" alt="Preview" />
      </div>
      <div class="preview-icon" *ngIf="!isImage">
        <mat-icon [color]="fileType.includes('pdf') ? 'warn' : 'primary'">
          {{ getFileIcon() }}
        </mat-icon>
      </div>
      <div class="preview-info">
        <p class="file-name">{{ fileName }}</p>
        <p class="file-type">{{ fileType || 'Unknown type' }}</p>
        <button mat-stroked-button (click)="fileInput.click()" class="change-btn">
          Change File
        </button>
      </div>
      <button mat-icon-button (click)="onRemove()" class="remove-btn">
        <mat-icon>close</mat-icon>
      </button>
    </div>
    <div *ngIf="isImage" class="success-message">
      <p>✓ Image preview loaded successfully</p>
    </div>
  </div>
</div>

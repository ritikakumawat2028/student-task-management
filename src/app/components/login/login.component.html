<div class="login-page">
  <!-- Back to Home Button -->
  <button class="back-home-btn" (click)="navigateToHome()">
    <mat-icon>arrow_back</mat-icon>
    Back to Home
  </button>

  <div class="login-card">
    <!-- Header Section with Gradient -->
    <div class="card-header">
      <div class="icon-container">
        <mat-icon>school</mat-icon>
      </div>
      <h1>Welcome Back</h1>
      <p>Sign in to access your dashboard</p>
    </div>

    <!-- Form Section -->
    <div class="card-body">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Email</label>
          <input 
            type="email" 
            formControlName="email" 
            placeholder="your.email@school.com"
            class="form-input">
          <div class="error-message" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')">
            Email is required
          </div>
          <div class="error-message" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('email')">
            Invalid email format
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="password-input-wrapper">
            <input 
              [type]="hidePassword ? 'password' : 'text'" 
              formControlName="password" 
              placeholder="••••••••"
              class="form-input">
            <button type="button" class="password-toggle" (click)="hidePassword = !hidePassword">
              <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>
          <div class="error-message" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('required')">
            Password is required
          </div>
        </div>

        <button type="submit" class="submit-btn" [disabled]="loginForm.invalid">
          Sign In
        </button>
      </form>

      <div class="register-link">
        Don't have an account? <a (click)="navigateToRegister()">Register here</a>
      </div>

      <div class="demo-box">
        <p class="demo-title">Demo Credentials:</p>
        <p class="demo-text">Admin: admin&#64;school.com / admin123</p>
      </div>
    </div>
  </div>
</div>
